<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Move Puzzle</title>
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel garage-panel">
        <h1>Car Move Garage</h1>
        <p class="subtitle">Place cars, then play the move list.</p>
        <div id="garage" class="garage" aria-label="Garage board"></div>
      </section>

      <section class="panel creator-panel">
        <h2>Create Car</h2>
        <form id="car-form" class="car-form">
          <div class="picker-label">Car Type</div>
          <div id="car-type-picker" class="car-type-picker" aria-label="Select car length and orientation">
            <div class="car-type-option" role="button" tabindex="0" data-length="2" data-orientation="horizontal" aria-pressed="true">
              <div class="shape shape-h2">
                <span></span><span></span>
              </div>
            </div>
            <div class="car-type-option" role="button" tabindex="0" data-length="3" data-orientation="horizontal" aria-pressed="false">
              <div class="shape shape-h3">
                <span></span><span></span><span></span>
              </div>
            </div>
            <div class="car-type-option" role="button" tabindex="0" data-length="2" data-orientation="vertical" aria-pressed="false">
              <div class="shape shape-v2">
                <span></span><span></span>
              </div>
            </div>
            <div class="car-type-option" role="button" tabindex="0" data-length="3" data-orientation="vertical" aria-pressed="false">
              <div class="shape shape-v3">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>

          <div class="picker-label">Color</div>
          <div id="color-picker" class="color-picker" aria-label="Select car color"></div>
        </form>
        <p class="hint">Click a cell on the board to place the selected car.</p>
      </section>

      <section class="panel controls-panel">
        <h2>Controls</h2>
        <div class="button-row">
          <button id="play-button" type="button">Play</button>
          <button id="solve-button" type="button">Solve</button>
          <button id="undo-button" type="button">Undo Last Placement</button>
        </div>
        <p id="status" class="status" aria-live="polite">Ready.</p>
      </section>

      <section class="panel moves-panel">
        <h2>Moves</h2>
        <p id="moves-summary" class="hint">Solve the puzzle to view generated moves.</p>
        <ol id="moves-list" class="moves-list"></ol>
      </section>
    </main>

    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
